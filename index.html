<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nocturnal Glow Weather</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  
  <style>
    :root {
      --bg-color: var(--tg-theme-bg-color, #0f172a);
      --text-color: var(--tg-theme-text-color, #f8fafc);
      --hint-color: var(--tg-theme-hint-color, #94a3b8);
      --btn-color: var(--tg-theme-button-color, #38bdf8);
      --btn-text: var(--tg-theme-button-text-color, #0f172a);
      --glow-color: rgba(56, 189, 248, 0.5);
    }

    body {
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, var(--bg-color), #1e1b4b);
      color: var(--text-color);
      margin: 0;
      padding: 24px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 90vh;
      box-sizing: border-box;
    }

    .container {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }

    h3 {
      font-size: 22px;
      margin-top: 0;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 20px var(--glow-color);
    }

    .subtitle {
      color: var(--hint-color);
      font-size: 14px;
      margin-bottom: 32px;
    }

    label {
      display: block;
      text-align: left;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
      color: #7dd3fc;
    }

    .input-group {
      margin-bottom: 24px;
    }

    select, input[type="datetime-local"] {
      width: 100%;
      padding: 14px 16px;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: var(--text-color);
      font-size: 16px;
      outline: none;
      transition: all 0.3s ease;
      box-sizing: border-box;
    }

    select:focus, input[type="datetime-local"]:focus {
      border-color: var(--btn-color);
      box-shadow: 0 0 12px var(--glow-color);
    }

    input[type="datetime-local"]::-webkit-calendar-picker-indicator {
      filter: invert(1);
      cursor: pointer;
    }

    .btn-submit {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #38bdf8, #6366f1);
      border: none;
      border-radius: 14px;
      color: var(--btn-text);
      font-size: 16px;
      font-weight: bold;
      letter-spacing: 0.5px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
      transition: transform 0.1s ease, box-shadow 0.3s ease;
    }

    .btn-submit:active {
      transform: scale(0.98);
      box-shadow: 0 2px 10px rgba(99, 102, 241, 0.2);
    }

    .footer {
      font-size: 11px;
      color: var(--hint-color);
      margin-top: 20px;
      opacity: 0.6;
    }
  </style>
</head>
<body>

  <div class="container">
    <h3>Nocturnal Glow</h3>
    <div class="subtitle">Метео-ассистент точного планирования</div>

    <div class="input-group">
      <label for="citySelect">Пункт назначения</label>
      <select id="citySelect">
        <option value="1">Москва 🏙</option>
        <option value="2">Санкт-Петербург 🏛</option>
        <option value="3">Вологда 🏡</option>
      </select>
    </div>

    <div class="input-group">
      <label for="dateInput">Дата и время целевого замера</label>
      <input type="datetime-local" id="dateInput">
    </div>
  </div>

  <div>
    <button class="btn-submit" onclick="sendDataToBot()">Сформировать метео-прогноз</button>
    <div class="footer">Данные синхронизированы с Open-Meteo API</div>
  </div>

 <script>
  const tg = window.Telegram.WebApp;
  tg.ready();
  tg.expand();

  // Автоматическая установка текущей даты и времени в календарь
  const now = new Date();
  now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
  document.getElementById('dateInput').value = now.toISOString().slice(0, 16);

  function sendDataToBot() {
    const cityId = document.getElementById('citySelect').value;
    const rawDate = document.getElementById('dateInput').value;

    if (!rawDate) {
      tg.showAlert("Пожалуйста, укажите дату и время.");
      return;
    }

    const formattedDate = rawDate.replace('T', ' ');

    // Сбор данных для отправки
    const payload = {
      city: cityId,
      date: formattedDate
    };

    // Проверяем, открыто ли на ПК/в браузере (через отсутствие initData)
    if (!tg.initData || tg.initData === "") {
      
      // Твой Telegram ID, куда бот пришлет погоду
      payload.chat_id = "872704216"; 

      // Прямой POST-запрос на бэкэнд Google Скриптов
      fetch("https://script.google.com/macros/s/AKfycbxMK9fo74RBFZHZkWBakdHLmwJnbb-hUY5ARb25n3I4-VDemjHvUVokt0Fj7On1uN_uQ/exec", {
        method: "POST",
        mode: "no-cors",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          type: "web_app_custom",
          data: payload
        })
      })
      .then(() => {
        // Плавно закрываем окно Web App после отправки
        tg.close();
      })
      .catch(err => {
        alert("Ошибка сети: " + err);
      });

    } else {
      // Если открыто на смартфоне — используем нативный метод Telegram
      tg.sendData(JSON.stringify(payload));
    }
  }
</script>
</body>
</html>
